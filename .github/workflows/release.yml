name: Release Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Sync the package.json version with the git tag on tag builds
      - name: Sync version with tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "Syncing package.json version to $TAG_VERSION"
          npm version $TAG_VERSION --no-git-tag-version

      - name: Import Code-Signing Certificates (macOS)
        if: matrix.os == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_P12_PASSWORD }}

      - name: Build and package app
        run: npm run make
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-music-tagger-artifacts-${{ runner.os }}
          path: |
            out/make/**/*.zip
            out/make/**/*.dmg
            out/make/**/*.exe
            out/make/**/*.deb
            out/make/**/*.rpm
            out/make/**/*.nupkg
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: ai-music-tagger-artifacts-*
          merge-multiple: true

      - name: List downloaded files
        run: ls -R release-artifacts

      - name: Create or Recreate GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Cleaning up any existing release for tag ${{ github.ref_name }} to prevent stale assets and double descriptions..."
          gh release delete ${{ github.ref_name }} --yes || true
          
          echo "Processing and standardizing asset names..."
          mkdir -p staging-assets
          
          find release-artifacts -type f | while read -r filepath; do
            filename=$(basename "$filepath")
            extension="${filename##*.}"
            
            # Skip Squirrel update packages
            if [ "$extension" = "nupkg" ]; then
              echo "Skipping update package: $filename"
              continue
            fi
            
            # Determine clear, standardized names
            case "$filename" in
              *.dmg)
                if [[ "$filepath" == *"arm64"* ]] || [[ "$filename" == *"arm64"* ]]; then
                  new_name="AI-Music-Tagger-v${{ github.ref_name }}-macOS-Apple-Silicon.dmg"
                else
                  new_name="AI-Music-Tagger-v${{ github.ref_name }}-macOS-Intel.dmg"
                fi
                ;;
              *.zip)
                if [[ "$filepath" == *"arm64"* ]] || [[ "$filename" == *"arm64"* ]]; then
                  new_name="AI-Music-Tagger-v${{ github.ref_name }}-macOS-Apple-Silicon.zip"
                else
                  new_name="AI-Music-Tagger-v${{ github.ref_name }}-macOS-Intel.zip"
                fi
                ;;
              *.exe)
                new_name="AI-Music-Tagger-v${{ github.ref_name }}-Windows-Setup.exe"
                ;;
              *.deb)
                new_name="AI-Music-Tagger-v${{ github.ref_name }}-Linux-Debian.deb"
                ;;
              *.rpm)
                new_name="AI-Music-Tagger-v${{ github.ref_name }}-Linux-RedHat.rpm"
                ;;
              *)
                new_name="AI-Music-Tagger-v${{ github.ref_name }}-$filename"
                ;;
            esac
            
            echo "Standardizing $filename to $new_name"
            cp "$filepath" "staging-assets/$new_name"
          done
          
          echo "Finding files to upload..."
          mapfile -t files < <(find staging-assets -type f)
          echo "Files to upload:"
          printf '%s\n' "${files[@]}"
          
          echo "Creating fresh release ${{ github.ref_name }} with clean assets..."
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            "${files[@]}"
